services:
  postgres:
    image: postgres:18
    container_name: belaberung-postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      - POSTGRES_DB=${BELABERUNG_PG_NAME}
      - POSTGRES_USER=${BELABERUNG_PG_USER}
      - POSTGRES_PASSWORD=${BELABERUNG_PG_PASS}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  valkey: 
    image: valkey/valkey:9
    container_name: belaberung-valkey
    restart: unless-stopped
    environment:
      - BELABERUNG_VALKEY_USER=${BELABERUNG_VALKEY_USER}
      - BELABERUNG_VALKEY_PASS=${BELABERUNG_VALKEY_PASS}
    ports:
      - 6379:6379
    volumes:
      - valkey_data:/data
      - ./Dockerfiles/docker-entrypoint.sh.valkey:/docker-entrypoint.sh:ro
    entrypoint: ["/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --user $$BELABERUNG_VALKEY_USER --pass $$BELABERUNG_VALKEY_PASS ping | grep PONG"]      
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  valkey_data: